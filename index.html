<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Creador100k — Night Records</title>
    <link rel="stylesheet" href="styles.css?v=20260720-28">
  </head>
  <body>
    <main class="scene scene--track-1" data-track="1" aria-label="Experiencia audiovisual de Creador100k">
      <div class="scene__backdrop" id="sceneBackdrop" aria-hidden="true"></div>
      <canvas id="world" aria-hidden="true"></canvas>
      <canvas id="particles" aria-hidden="true"></canvas>

      <button class="collection-trigger" id="collectionTrigger" type="button" aria-label="Cambiar canción">
        <span class="collection-trigger__disc" aria-hidden="true"></span>
        <span class="collection-trigger__label">Colección</span>
      </button>

      <div class="track-card">
        <button
          class="track-card__toggle"
          id="trackButton"
          type="button"
          aria-label="Reproducir la canción y alternar pantalla completa. Listening to: I have to go… forever — Creador100k"
          aria-pressed="false"
        >
          <span class="track-card__copy">
            <span class="track-card__label">Listening to:</span>
            <span class="track-card__title">I have to go… forever</span>
            <span class="track-card__artist">Creador100k</span>
          </span>
        </button>
        <div class="track-card__timeline">
          <input
            class="track-card__seek"
            id="trackSeek"
            type="range"
            min="0"
            max="1000"
            value="0"
            step="1"
            aria-label="Posición de la canción"
          >
          <div class="track-card__times" aria-hidden="true">
            <output id="trackCurrent">0:00</output>
            <output id="trackDuration">1:40</output>
          </div>
          <div class="track-card__preview-row">
            <div class="track-card__preview">Preview</div>
            <button
              class="track-card__playback"
              id="previewPlayback"
              type="button"
              aria-label="Reproducir preview"
              aria-pressed="false"
            >
              <span class="track-card__play-icon" aria-hidden="true"></span>
              <span class="track-card__pause-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>

      <audio id="soundtrack" src="Imagen1.mp3" preload="auto"></audio>

      <div class="load-state" id="loadState" role="status">Preparando el umbral…</div>

      <section class="record-library" id="recordLibrary" aria-labelledby="libraryTitle">
        <div class="record-library__atmosphere" aria-hidden="true"></div>
        <img
          class="record-library__signature"
          src="firma.png"
          alt=""
          aria-hidden="true"
        >
        <header class="record-library__header">
          <p class="record-library__eyebrow">Creador100k presents</p>
          <h1 id="libraryTitle">Choose a record</h1>
          <p class="record-library__intro">Seleccioná un vinilo para entrar en su escena.</p>
        </header>

        <div class="record-library__shelf" role="group" aria-label="Canciones disponibles">
          <div class="record-entry">
            <button
              class="record-choice record-choice--warm"
              type="button"
              data-track-id="1"
              aria-label="Abrir la escena de I have to go… forever de Creador100k"
            >
              <span class="record-choice__object" aria-hidden="true">
                <span class="record-choice__vinyl">
                  <span class="record-choice__label record-choice__label--one"></span>
                </span>
                <span class="record-choice__sleeve">
                  <img src="Imagen1.png" alt="" draggable="false">
                  <canvas class="record-choice__preview-canvas" data-mini-scene="1"></canvas>
                  <span class="record-choice__sleeve-grain"></span>
                  <span class="record-choice__number">01</span>
                </span>
              </span>
            </button>
            <div class="record-entry__footer">
              <button
                class="record-intro"
                type="button"
                data-intro-track-id="1"
                aria-label="Reproducir preview de I have to go… forever, desde 0:39 hasta 1:05"
                aria-pressed="false"
              >
                <span class="record-intro__icon" aria-hidden="true"></span>
              </button>
              <div class="record-choice__details">
                <span class="record-choice__title">I have to go… forever</span>
                <span class="record-choice__meta">Creador100k &middot; Preview</span>
                <span class="record-intro__timeline" aria-hidden="true"></span>
              </div>
            </div>
          </div>

          <div class="record-entry">
            <button
              class="record-choice record-choice--cold"
              type="button"
              data-track-id="2"
              aria-label="Abrir la escena de Perfume and Wine 壊さないで de Creador100k"
            >
              <span class="record-choice__object" aria-hidden="true">
                <span class="record-choice__vinyl">
                  <span class="record-choice__label record-choice__label--two"></span>
                </span>
                <span class="record-choice__sleeve">
                  <img src="Imagen2.png" alt="" draggable="false">
                  <canvas class="record-choice__preview-canvas" data-mini-scene="2"></canvas>
                  <span class="record-choice__sleeve-grain"></span>
                  <span class="record-choice__number">02</span>
                </span>
              </span>
            </button>
            <div class="record-entry__footer">
              <button
                class="record-intro"
                type="button"
                data-intro-track-id="2"
                aria-label="Reproducir preview de Perfume and Wine 壊さないで, desde 1:19 hasta 1:40"
                aria-pressed="false"
              >
                <span class="record-intro__icon" aria-hidden="true"></span>
              </button>
              <div class="record-choice__details">
                <span class="record-choice__title">Perfume and Wine 壊さないで</span>
                <span class="record-choice__meta">Creador100k &middot; Preview</span>
                <span class="record-intro__timeline" aria-hidden="true"></span>
              </div>
            </div>
          </div>
        </div>

        <p class="record-library__hint">Play para escuchar &middot; Portada para entrar &middot; Esc para volver</p>
      </section>
      <audio id="libraryPreview" preload="metadata"></audio>
    </main>
    <script src="animation.js?v=20260720-27"></script>
  </body>
</html>
